<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >
    <title>Weather Radar</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="theme-dark">
    <div id="map" aria-label="Weather radar map"></div>

    <div id="status" class="status is-hidden" aria-live="polite"></div>
    <div class="info-panel">
      <div id="timestamp" class="timestamp">Loading radar...</div>
      <div class="source-attribution">
        Radar:
        <a href="https://www.rainviewer.com/" target="_blank" rel="noopener noreferrer">RainViewer</a>
      </div>
    </div>

    <div id="kioskHint" class="kiosk-hint is-hidden" aria-live="polite">
      <button id="kioskHintCloseButton" class="kiosk-hint-close" type="button" aria-label="Dismiss kiosk mode hint">
        X
      </button>
      <div class="kiosk-hint-title">Kiosk Mode</div>
      <div class="kiosk-hint-body">
        On iPad, add this page to the Home Screen and enable Guided Access for a cleaner always-on display.
      </div>
    </div>

    <div id="controls" class="controls">
      <button id="playPauseButton" type="button">Play</button>
      <button id="prevButton" type="button">Prev</button>
      <button id="nextButton" type="button">Next</button>
      <button id="refreshButton" type="button">Refresh</button>
      <button id="locateButton" type="button">Locate Me</button>
      <button id="stormReportsButton" type="button">Storm Reports</button>
      <button id="themeButton" type="button">Light Mode</button>
    </div>

    <noscript>
      <div class="noscript-message">
        This page needs JavaScript enabled to load weather radar frames.
      </div>
    </noscript>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
